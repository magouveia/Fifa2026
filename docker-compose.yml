version: '3.8'

services:
  mundial-2026-app:
    build: .
    container_name: mundial-2026-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DISABLE_AUTO_OPEN=true
      - JWT_SECRET=your_super_secret_jwt_key_here
      - PORT=3000
      - DB_PATH=data/mundial.db
    volumes:
      - ./data:/app/data
